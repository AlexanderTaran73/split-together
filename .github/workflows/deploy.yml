name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/alexandertaran73/split-together
  DEPLOY_HOST: 88.216.208.6
  DEPLOY_USER: root

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests and build jar
        run: |
          chmod +x gradlew
          ./gradlew test bootJar

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync config to server
        run: scp docker-compose.yml nginx.conf "$DEPLOY_USER@$DEPLOY_HOST:/opt/splittogether/"

      - name: Pull image and restart app
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
             && cd /opt/splittogether \
             && docker compose pull app \
             && docker compose up -d --remove-orphans \
             && docker compose restart nginx \
             && docker image prune -f"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fs https://88.216.208.6.nip.io:8443/actuator/health | grep -q '"UP"'; then
              echo "Application is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 150 seconds."
          exit 1
