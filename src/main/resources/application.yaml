spring:
  application:
    name: split-together
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
  datasource:
    url: jdbc:postgresql://localhost:5432/splittogether
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

storage:
  internal-endpoint: ${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  region: ${MINIO_REGION:us-east-1}
  bucket: ${MINIO_BUCKET:splittogether}
  presign-ttl-seconds: ${MINIO_PRESIGN_TTL:900}

currency:
  cbr-url: ${CBR_URL:https://www.cbr.ru/scripts/XML_daily.asp}
  refresh-cron: "0 0 16 * * *"

email:
  from: ${MAIL_FROM:noreply@splittogether.com}

auth:
  jwt:
    secret: ${JWT_SECRET:tempMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI}
    access-token-expiry: 900000      # 15 minutes in ms
    refresh-token-expiry-days: 30
  verification:
    fixed-code: ""  # set to "000000" for manual testing convenience

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
