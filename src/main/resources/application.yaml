spring:
  application:
    name: split-together
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
  datasource:
    url: jdbc:postgresql://localhost:5432/splittogether
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

email:
  from: ${MAIL_FROM:noreply@splittogether.com}

auth:
  jwt:
    secret: ${JWT_SECRET:tempMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI}
    access-token-expiry: 900000      # 15 minutes in ms
    refresh-token-expiry-days: 30
  verification:
    fixed-code: ""  # set to "000000" for manual testing convenience

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
